# YuHung + Supabase 反向代理（解決 CORS / preflight 失敗）
# 瀏覽器只對同來源發請求，由 Nginx 轉發到 Supabase，因此不會觸發 CORS。
#
# 使用方式：
# 1. 若專案 ref 不同，把設定裡的 cgrlvepdnboidphhzhiw 替換成你的（Supabase URL 中間那段）
# 2. root 改成你放網站檔案的目錄（例如 /var/www/yuhung）
# 3. 複製到 nginx：sudo cp deploy/nginx-yuhung-with-supabase-proxy.conf /etc/nginx/sites-available/yuhung
# 4. 啟用、測試、重載（同一般 nginx 設定）
#
# 5. 在「部署到 VM 的」config.js 裡，改用代理網址，例如：
#    window.SUPABASE_URL = window.location.origin + '/supabase-proxy';
#    window.SUPABASE_ANON_KEY = '你的 anon key';
#    本機開發時可改回直接連 Supabase 的網址。

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/yuhung;
    index index.html;
    server_name _;

    # 代理 Supabase（請把下面 cgrlvepdnboidphhzhiw 改成你的專案 ref）
    location /supabase-proxy/ {
        rewrite ^/supabase-proxy/(.*)$ /$1 break;
        proxy_pass https://cgrlvepdnboidphhzhiw.supabase.co;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host cgrlvepdnboidphhzhiw.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        # 避免 preflight 被吃調
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, apikey, x-client-info';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /admin.html {
        try_files $uri =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}
