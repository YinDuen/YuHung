# YuHung 靜態網站 — Nginx 設定範例
# 此專案為純靜態檔（HTML/CSS/JS），不需要 Node.js，由 nginx 直接提供檔案即可。
#
# 使用方式（在 VM 上）：
# 1. 把整份專案放到 /var/www/yuhung（或你指定的目錄）
# 2. 複製此檔到 nginx：sudo cp deploy/nginx-yuhung.conf /etc/nginx/sites-available/yuhung
# 3. 啟用：sudo ln -s /etc/nginx/sites-available/yuhung /etc/nginx/sites-enabled/
# 4. 測試：sudo nginx -t
# 5. 重載：sudo systemctl reload nginx
#
# 若要用自己的網域，把 server_name _ 改成你的網域，例如 server_name example.com www.example.com;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # 放網站檔案的目錄（請改成你實際的路徑）
    root /var/www/yuhung;
    index index.html;

    server_name _;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 後台管理頁
    location = /admin.html {
        try_files $uri =404;
    }

    # 靜態資源快取
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 安全：不暴露隱藏檔
    location ~ /\. {
        deny all;
    }
}
