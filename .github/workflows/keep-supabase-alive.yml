name: Keepalive (Supabase + Repo)

# 目的（雙重）：
# 1) Supabase keepalive：定期呼叫 REST API，避免免費版專案因 7 天無活動被暫停。
# 2) Repo keepalive：產生一筆 heartbeat commit，避免 GitHub 因 repo 60 天無活動
#    而自動停用所有排程 workflow（包括這個 workflow 自己）。
#
# 機制：
# - 從 config.js 讀取 SUPABASE_URL 與 SUPABASE_ANON_KEY（anon key 本來就公開）。
# - 對 about / repertoire / media / contact 各送一筆 select 請求。
# - 把當前 UTC 時間寫入 .github/last-active.txt 並用 github-actions bot 提交。

on:
  schedule:
    # 每 3 天 UTC 03:17（台北時間 11:17）執行一次。
    # 月底最大間隔約 4 天，遠低於 Supabase 7 天暫停門檻；
    # 對 repo 60 天規則也綽綽有餘。
    - cron: '17 3 */3 * *'
  # 允許在 GitHub Actions 頁面手動觸發（測試或剛從暫停恢復時用）
  workflow_dispatch:

# heartbeat step 需要 push 提交，所以 contents 需 write
permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        # v5 已宣告 using: node24，避開 v4 的 Node 20 deprecation 警告
        uses: actions/checkout@v5

      - name: Parse Supabase config from config.js
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          URL=$(grep -oP "SUPABASE_URL\s*=\s*'\K[^']+" config.js || true)
          KEY=$(grep -oP "SUPABASE_ANON_KEY\s*=\s*'\K[^']+" config.js || true)
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::Failed to parse SUPABASE_URL or SUPABASE_ANON_KEY from config.js"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          # anon key 雖然公開，仍從 log 中遮蔽以免誤觸警示
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Ping Supabase tables
        env:
          SUPABASE_URL: ${{ steps.cfg.outputs.url }}
          SUPABASE_ANON_KEY: ${{ steps.cfg.outputs.key }}
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for table in about repertoire media contact; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/${table}?select=id&limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
            echo "  ${table}: HTTP ${code}"
            if [ "$code" != "200" ]; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::至少一個資料表查詢失敗，請確認 Supabase 是否健康"
            exit 1
          fi
          echo "✓ Supabase keepalive 完成"

      # 把當前 UTC 時間寫入一個 heartbeat 檔並 commit/push 回去。
      # 這筆提交算 repo 活動 → 避免 60 天閒置導致排程 workflow 被自動停用。
      # Supabase ping 失敗時就不會跑到這步，避免在 Supabase 異常時還反覆刷提交。
      - name: Heartbeat commit (keep repo active)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "$NOW" > .github/last-active.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 先 stage 再用 --cached 比對 index vs HEAD：對新建（untracked）檔也有效。
          # 用 git diff（unstaged）會把 untracked 檔當成「無變更」，那是錯的。
          git add .github/last-active.txt
          if git diff --cached --quiet -- .github/last-active.txt; then
            # timestamp 每次都不同，理論上不可能無 diff。走到這裡代表 workflow 有 bug，
            # 直接 fail 而不是靜默 exit 0，避免「workflow 綠勾但實際沒提交」這種隱性失敗。
            {
              echo "## ❌ Heartbeat 失敗"
              echo ""
              echo "預期 \`.github/last-active.txt\` 會有變更（timestamp 應每次不同），但 \`git diff --cached\` 顯示無 diff。"
              echo "這通常代表 workflow 邏輯出問題，請檢查 Heartbeat 步驟。"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::heartbeat 內容與 HEAD 相同 — 不該發生，請檢查 workflow 邏輯"
            exit 1
          fi
          git commit -m "chore: keepalive heartbeat ${NOW}"
          SHA=$(git rev-parse --short HEAD)
          # 用內建 GITHUB_TOKEN（已在 contents:write 權限下）push 回 default branch
          git push
          {
            echo "## ✅ Heartbeat 成功"
            echo ""
            echo "- Commit: \`${SHA}\`"
            echo "- Timestamp: \`${NOW}\`"
          } >> "$GITHUB_STEP_SUMMARY"
